<head>

<meta name="description" content="Latest Government Jobs, Admit Cards, Results">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>DAILY UPDATE</h1>
  <p>Latest Jobs | Admit Card | Results</p>
</div>

<div class="menu">
  <a href="index.html">Home</a>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchPost()">
</div>

<div class="container">

  <div class="box">
    <h2>Latest Jobs</h2>
    <ul id="jobsList"></ul>
  </div>

  <div class="box">
    <h2>Admit Card</h2>
    <ul id="admitList"></ul>
  </div>

  <div class="box">
    <h2>Results</h2>
    <ul id="resultList"></ul>
  </div>

  <div class="box">
    <h2>More Information</h2>
    <ul id="moreinformationList"></ul>
  </div>

</div>

<script type="module" src="script.js"></script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBSS9bPh6oXLKIzUHrhqjXzGXWz-2ecTU",
  authDomain: "daily-updates-f1147.firebaseapp.com",
  projectId: "daily-updates-f1147",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPosts(){
let container = document.getElementById("posts");
container.innerHTML = "Loading...";

const querySnapshot = await getDocs(collection(db,"posts"));

container.innerHTML = "";

querySnapshot.forEach((doc)=>{
let data = doc.data();

let div = document.createElement("div");
div.innerHTML = `
<h3>${data.title}</h3>
<p>${data.article}</p>
<a href="${data.link}" target="_blank">Download</a>
<hr>
`;

container.appendChild(div);
});
}

loadPosts();

  </script>
</body>
